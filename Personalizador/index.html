    <link rel="stylesheet" href="estilos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&display=swap" rel="stylesheet">

<body>

<header>
    <div class="header-content">
        <h2>GetInWeb Generator</h2>

        <nav>
            <a href="../index.php">Inicio</a>
            <a href="../explorador.php">Plantillas</a>
            <a href="#">Contacto</a>
        </nav>
    </div>
</header>

<main>

    <section class="hero">
        <h1>Generá tu página web ideal</h1>

        <p>
            Elegí el estilo, las funcionalidades y personalizá cada detalle
            para crear TU web en segundos.
        </p>
    </section>

    <div class="container">

        <div class="panel">

            <h2>Configuración</h2>

            <label>Tipo de proyecto</label>
            <select id="tipo">
                <option value="ecommerce">E-commerce</option>
                <option value="portfolio">Portfolio</option>
                <option value="proyectos">Proyectos personales</option>
                <option value="fotografia">Fotografía</option>
            </select>

            <label>Estilo visual</label>
            <select id="tema">
                <option value="dark">Tema Oscuro</option>
                <option value="light">Tema Claro</option>            </select>

            <label>Color principal</label>
            <select id="color">
                <option value="violet">Violeta</option>
                <option value="blue">Azul</option>
                <option value="green">Verde</option>
            </select>

            <label>Funcionalidades</label>

            <div class="features">
                <label><input type="checkbox" id="carrito"> Carrito</label>
                <label><input type="checkbox" id="galeria"> Galería</label>
                <label><input type="checkbox" id="contacto"> Contacto</label>
                <label><input type="checkbox" id="modo"> Modo oscuro</label>
            </div>

            <button onclick="generarPagina()">Generar Página</button>

        </div>

        <div id="preview" class="preview dark">
            <h2>Vista previa</h2>
            <p>Configurá opciones y presioná generar.</p>
        </div>

    </div>

</main>
